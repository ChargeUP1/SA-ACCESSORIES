  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA Accessories</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0b0b;
    color:#fff;
}

h1{
    text-align:center;
    color:#d4af37;
    padding:50px 20px;
    font-size:50px;
}

.products{
    max-width:1300px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:35px;
}

.card{
    background:#111;
    border:1px solid rgba(212,175,55,.3);
    border-radius:18px;
    overflow:hidden;
    text-align:center;
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px);
    border-color:#d4af37;
    box-shadow:0 0 30px rgba(212,175,55,.25);
}

.card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.content{
    padding:25px;
}

.content h3{
    margin-bottom:10px;
    color:#d4af37;
}

.content p{
    color:#ccc;
    margin-bottom:15px;
}

.price{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.btn{
    padding:12px 30px;
    border:none;
    border-radius:50px;
    background:linear-gradient(90deg,#d4af37,#b8860b);
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    background:#fff;
}

@media(max-width:900px){
    .products{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:600px){
    .products{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<h1>Our Products🔥</h1>

<div class="products">

<div class="card">
<img src="https://i.ibb.co/ZRLbwWWk/Chat-GPT-Image-Jun-19-2026-02-32-43-PM.png">
<div class="content">
<h3>Premium Earbuds</h3>
<p>Crystal clear sound experience</p>
<div class="price">RS:999</div>
<a href="buy.html"><button class="btn">Buy Now</button></a>
</div>
</div>

<div class="card">
<img src="https://i.ibb.co/dsJkWB1S/Chat-GPT-Image-Jun-19-2026-12-11-32-PM.png">
<div class="content">

<p>65W Super Fast Charging</p>
<div class="price">RS:299</div>
<a href="buyy.html"><button class="btn">Buy Now</button></a>
</div>
</div>

<div class="card">

<div class="content">
<h3>Astro Anker E1</h3>
<p>5200mAh Portable Power</p>
<div class="price">RS:1199</div>
<a href="buyyy.html"><button class="btn">Buy Now</button></a>
</div>
</div>

<div class="card">
<img src="https://i.ibb.co/tpFx1ryG/Chat-GPT-Image-Jun-19-2026-09-42-06-PM.png">
<div class="content">
<h3>Fast Charger</h3>
<p>20W USB-C Adapter</p>
<div class="price">RS:299</div>

</html>
